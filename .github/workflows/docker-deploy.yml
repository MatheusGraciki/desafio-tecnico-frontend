name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["master"]

env:
  NODE_VERSION: 20
  PAGES_PROJECT_NAME: eco-automacao-industrial
  BUILD_DIR: dist

jobs:
  security-checks:
    name: Security Checks (PROD)
    runs-on: ubuntu-22.04

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gitleaks - Secrets Scan
        uses: gitleaks/gitleaks-action@v2

      - name: npm audit (HIGH / CRITICAL)
        run: npm audit --audit-level=high

  deploy:
    name: Build, Validate Docker and Deploy
    needs: security-checks
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t frontend-test .

      - name: List Docker images
        run: docker images

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ${{ env.BUILD_DIR }} --project-name=${{ env.PAGES_PROJECT_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify-security-failure:
    name: Notify Discord (Security Failure)
    runs-on: ubuntu-22.04
    needs: security-checks
    if: ${{ always() && needs.security-checks.result == 'failure' }}
    steps:
      - name: Notify Discord
        run: |
          curl -f -H "Content-Type: application/json" \
            -d '{
              "content": "🚨 **DEPLOY BLOQUEADO (SEGURANÇA)**\n\n🔒 Política PROD:\n• Secrets vazados ❌\n• Vulnerabilidades HIGH / CRITICAL ❌\n\n🔹 Projeto: **${{ env.PAGES_PROJECT_NAME }}**\n🔹 Branch: **${{ github.ref_name }}**\n📝 Commit: _${{ github.event.head_commit.message }}_\n\n🔗 Logs:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.DISCORD_WEBHOOK_FAILURE }}"

  notify-deploy-failure:
    name: Notify Discord (Deploy Failure)
    runs-on: ubuntu-22.04
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'failure' }}
    steps:
      - name: Notify Discord
        run: |
          curl -f -H "Content-Type: application/json" \
            -d '{
              "content": "❌ **DEPLOY PROD FALHOU**\n\n🔹 Projeto: **${{ env.PAGES_PROJECT_NAME }}**\n🔹 Branch: **${{ github.ref_name }}**\n📝 Commit: _${{ github.event.head_commit.message }}_\n\n🔗 Logs:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.DISCORD_WEBHOOK_FAILURE }}"

  notify-success:
    name: Notify Discord (Success)
    runs-on: ubuntu-22.04
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    steps:
      - name: Notify Discord
        run: |
          curl -f -H "Content-Type: application/json" \
            -d '{
              "content": "✅ **DEPLOY PROD REALIZADO COM SUCESSO**\n\n🔹 Projeto: **${{ env.PAGES_PROJECT_NAME }}**\n🔹 Branch: **${{ github.ref_name }}**\n📝 Commit: _${{ github.event.head_commit.message }}_\n\n🔗 Logs:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.DISCORD_WEBHOOK_SUCCESS }}"