name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["master"]

env:
  NODE_VERSION: 20
  PAGES_PROJECT_NAME: eco-automacao-industrial
  BUILD_DIR: dist

jobs:
  security-checks:
    name: Security Checks (PROD)
    runs-on: ubuntu-22.04

    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gitleaks - Secrets Scan
        uses: gitleaks/gitleaks-action@v2

      - name: npm audit (HIGH / CRITICAL)
        run: npm audit --audit-level=high

  deploy:
    name: Build, Validate Docker and Deploy
    needs: security-checks
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t frontend-test .

      - name: List Docker images
        run: docker images

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ${{ env.BUILD_DIR }} --project-name=${{ env.PAGES_PROJECT_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify-security-failure:
    name: Notify Discord (Security Failure)
    runs-on: ubuntu-22.04
    needs: security-checks
    if: ${{ always() && needs.security-checks.result == 'failure' }}
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FAILURE }}
          PROJECT_NAME: ${{ env.PAGES_PROJECT_NAME }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          curl -f -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🚨 **Deploy bloqueado por segurança**\n\n📦 **Projeto:** ${PROJECT_NAME}\n🌿 **Branch:** ${BRANCH_NAME}\n👤 **Autor:** ${ACTOR}\n⚙️ **Workflow:** ${WORKFLOW_NAME} #${RUN_NUMBER}\n\n🧾 **Commit:** \`${SHORT_SHA}\`\n💬 **Mensagem:** ${COMMIT_MESSAGE}\n\n🔒 **Motivo provável:**\n• Secrets detectados pelo Gitleaks\n• Vulnerabilidades HIGH / CRITICAL no npm audit\n\n🔗 **Logs:** https://github.com/${REPO}/actions/runs/${RUN_ID}\n🔗 **Commit:** https://github.com/${REPO}/commit/${COMMIT_SHA}\"
            }" \
            "$DISCORD_WEBHOOK"

  notify-deploy-failure:
    name: Notify Discord (Deploy Failure)
    runs-on: ubuntu-22.04
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'failure' }}
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_FAILURE }}
          PROJECT_NAME: ${{ env.PAGES_PROJECT_NAME }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          curl -f -H "Content-Type: application/json" \
            -d "{
              \"content\": \"❌ **Deploy de produção falhou**\n\n📦 **Projeto:** ${PROJECT_NAME}\n🌿 **Branch:** ${BRANCH_NAME}\n👤 **Autor:** ${ACTOR}\n⚙️ **Workflow:** ${WORKFLOW_NAME} #${RUN_NUMBER}\n\n🧾 **Commit:** \`${SHORT_SHA}\`\n💬 **Mensagem:** ${COMMIT_MESSAGE}\n\n🛠️ **Etapas executadas antes da falha:**\n• Build da aplicação\n• Validação com Docker\n• Tentativa de deploy no Cloudflare Pages\n\n🔗 **Logs:** https://github.com/${REPO}/actions/runs/${RUN_ID}\n🔗 **Commit:** https://github.com/${REPO}/commit/${COMMIT_SHA}\"
            }" \
            "$DISCORD_WEBHOOK"

  notify-success:
    name: Notify Discord (Success)
    runs-on: ubuntu-22.04
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_SUCCESS }}
          PROJECT_NAME: ${{ env.PAGES_PROJECT_NAME }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          curl -f -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ **Deploy realizado com sucesso**\n\n📦 **Projeto:** ${PROJECT_NAME}\n🌿 **Branch:** ${BRANCH_NAME}\n👤 **Autor:** ${ACTOR}\n⚙️ **Workflow:** ${WORKFLOW_NAME} #${RUN_NUMBER}\n\n🧾 **Commit:** \`${SHORT_SHA}\`\n💬 **Mensagem:** ${COMMIT_MESSAGE}\n\n🚀 **Etapas concluídas:**\n• Segurança validada\n• Build da aplicação concluído\n• Imagem Docker validada\n• Deploy publicado no Cloudflare Pages\n\n🔗 **Logs:** https://github.com/${REPO}/actions/runs/${RUN_ID}\n🔗 **Commit:** https://github.com/${REPO}/commit/${COMMIT_SHA}\n🔗 **Projeto:** https://${PROJECT_NAME}.pages.dev\"
            }" \
            "$DISCORD_WEBHOOK"